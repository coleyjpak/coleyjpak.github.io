<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Roll DX</title>
    <script src="js/script.js" defer></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body onload="onloadFunction()">

  <header class="mainheader row align-content-center">
    <div class="col-md-7 col-1"></div>
    <div class="col-md-5 col-10">
      <h1><b><i>Roll DX</b></i></h1>
      <h2><i>A random number generator</i></h2>
    </div>
  </header>

  <section class="row">

    <div class="col-md-5 col-12">

      <p class="align-center-text">enter a minimum and enter a maximum</p>
      <div class="row justify-content-center">
        <input class="numberinput" type="text" id="genMinInput">
        <input class="numberinput" type="text" id="genMaxInput">
      </div>
      <div class="row">
        <p class="btn body-lg" onclick="genRandomNumber()"><b>Roll</b></p>
      </div>

      <div class="row">
        <p class="btn body-sm" onclick="resetLog()"><b>Reset Log</b></p>
      </div>

      <p class="body-lg align-center-text" id="errorDisplay"></p>

    </div>
    <div class="col-md-7 col-12 align-content-center bg-gray">
      <!-- <p class="body-lg align-center-text no-margin">Generated Number:</p> -->
      <p class="d-none body-xl align-center-text extra-padding" id="numberDisplay">...</p>

      <p class="align-center-text body-md">Numbers Generated:</p>

      <table class="table table-hover width-400 align-center">
        <thead>
          <tr>
            <th class="body-sm width-200">Roll</th>
            <th class="body-sm width-200">Range</th>
          </tr>
        </thead>
          <tbody class="overflow-y-scroll height-500" id="resultLogDisplay"></tbody>
      </table>

    </div>

  </section>

  <footer>
    <p class="align-center-text body-lg"><b>Roll DX v0.3</b></p>
    <p class="align-center-text body-md">A random number generator tool</p>
    <p class="align-center-text">©? 2025 Cole Pak (idk how copyright works)</p>

  </footer>

</body>
